services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ride
      POSTGRES_PASSWORD: ride
      POSTGRES_DB: ride
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://ride:ride@db:5432/ride
      ENV: dev
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./backend:/app

volumes:
  pgdata: